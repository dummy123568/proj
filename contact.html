<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Quick Recipes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navigation -->
<nav class="navbar">
    <div class="container nav-container">
        <a href="index.html" class="logo">
            <img src="1.jpg" alt="Quick Recipes Logo" class="logo-img">
            <span class="logo-text">Quick Recipes</span>
        </a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">HOME</a>
            <a href="recipe.html" class="nav-link">RECIPE</a>
            <a href="contact.html" class="nav-link active">CONTACT</a>
        </div>
    </div>
</nav>

<!-- Contact Section -->
<div class="container contact-page">
    <h1 class="page-title">Get In Touch</h1>
    <p class="page-subtitle">Have a question or recipe suggestion? I'd love to hear from you!</p>

    <div class="contact-card">

        <!-- ✅ FIX: change action -->
        <form class="contact-form" action="#thankyou" method="get">

            <div class="form-group">
                <label for="name" class="form-label">NAME:</label>
                <div class="input-wrapper">
                    <input type="text" id="name" name="name" class="form-input" placeholder="Your name" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">EMAIL:</label>
                <div class="input-wrapper">
                    <input type="email" id="email" name="email" class="form-input" placeholder="your.email@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="message" class="form-label">MESSAGE:</label>
                <div class="input-wrapper">
                    <textarea id="message" name="message" class="form-textarea" rows="6" placeholder="Your message..." required></textarea>
                </div>
            </div>

            <button type="submit" class="submit-button">SUBMIT</button>
        </form>

        <!--  ADD THIS (Thank You message) -->
        <div id="thankyou" class="thank-you-message">
             Thank you! Your message has been sent.
        </div>

    </div>
</div>

</body>
</html>
